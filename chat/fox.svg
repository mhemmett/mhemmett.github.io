<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" shape-rendering="crispEdges" role="img" aria-label="Pixel fox avatar">
  <!-- palette: rust #D85A30, cream #F5E6D3, charcoal #2C2C2A -->
  <g fill="#D85A30">
    <!-- ear outer -->
    <rect x="2" y="3" width="1" height="1"/>
    <rect x="19" y="3" width="1" height="1"/>
    <rect x="1" y="4" width="2" height="1"/>
    <rect x="19" y="4" width="2" height="1"/>
    <rect x="1" y="5" width="2" height="1"/>
    <rect x="19" y="5" width="2" height="1"/>
    <rect x="1" y="6" width="2" height="1"/>
    <rect x="19" y="6" width="2" height="1"/>
    <!-- head -->
    <rect x="1" y="7" width="20" height="1"/>
    <rect x="0" y="8" width="22" height="1"/>
    <rect x="0" y="9" width="22" height="1"/>
    <rect x="0" y="10" width="4" height="1"/>
    <rect x="5" y="10" width="12" height="1"/>
    <rect x="18" y="10" width="4" height="1"/>
    <rect x="0" y="11" width="22" height="1"/>
    <rect x="0" y="12" width="22" height="1"/>
    <rect x="1" y="13" width="5" height="1"/>
    <rect x="16" y="13" width="5" height="1"/>
    <rect x="2" y="14" width="3" height="1"/>
    <rect x="17" y="14" width="3" height="1"/>
    <rect x="3" y="15" width="1" height="1"/>
    <rect x="18" y="15" width="1" height="1"/>
    <rect x="4" y="16" width="1" height="1"/>
    <rect x="17" y="16" width="1" height="1"/>
    <rect x="5" y="17" width="1" height="1"/>
    <rect x="16" y="17" width="1" height="1"/>
    <rect x="6" y="18" width="2" height="1"/>
    <rect x="14" y="18" width="2" height="1"/>
    <rect x="8" y="19" width="6" height="1"/>
  </g>
  <g fill="#F5E6D3">
    <!-- inner ears -->
    <rect x="3" y="5" width="1" height="1"/>
    <rect x="18" y="5" width="1" height="1"/>
    <rect x="3" y="6" width="2" height="1"/>
    <rect x="17" y="6" width="2" height="1"/>
    <!-- snout / chin -->
    <rect x="6" y="13" width="10" height="1"/>
    <rect x="5" y="14" width="12" height="1"/>
    <rect x="4" y="15" width="6" height="1"/>
    <rect x="12" y="15" width="6" height="1"/>
    <rect x="5" y="16" width="5" height="1"/>
    <rect x="12" y="16" width="5" height="1"/>
    <rect x="6" y="17" width="10" height="1"/>
    <rect x="8" y="18" width="6" height="1"/>
  </g>
  <g fill="#2C2C2A">
    <!-- ear tips -->
    <rect x="2" y="2" width="2" height="1"/>
    <rect x="18" y="2" width="2" height="1"/>
    <rect x="3" y="3" width="1" height="1"/>
    <rect x="18" y="3" width="1" height="1"/>
    <rect x="3" y="4" width="1" height="1"/>
    <rect x="18" y="4" width="1" height="1"/>
    <!-- eyes -->
    <rect x="4" y="10" width="1" height="1"/>
    <rect x="17" y="10" width="1" height="1"/>
    <!-- nose -->
    <rect x="10" y="15" width="2" height="1"/>
    <rect x="10" y="16" width="2" height="1"/>
  </g>
</svg>
